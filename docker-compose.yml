# Docker Compose configuration for local development and testing
# Provides: Django app, PostgreSQL, Redis
# WARNING: Use this only for development - adjust for production deployments

version: "3.9"

services:
  # Django application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-auth-app
    command: >
      bash -c "python manage.py migrate &&
               python manage.py collectstatic --no-input &&
               gunicorn --bind 0.0.0.0:8000 --workers 2 --reload src.wsgi:application"
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=src.settings
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/enterprise_auth_dev
      - REDIS_URL=redis://cache:6379/0
      - CELERY_BROKER_URL=redis://cache:6379/1
      - SECRET_KEY=dev-secret-key-not-for-production
      - ALLOWED_HOSTS=localhost,127.0.0.1,app
      - POSTGRES_DB=enterprise_auth_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - app_logs:/app/logs
      - app_static:/app/static
      - app_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - enterprise-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: enterprise-auth-postgres
    environment:
      - POSTGRES_DB=enterprise_auth_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=en_US.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    networks:
      - enterprise-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enterprise_auth_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis cache & message broker
  cache:
    image: redis:7-alpine
    container_name: enterprise-auth-redis
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - enterprise-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: enterprise-auth-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@localhost
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_PROXY_X_FOR_COUNT=1
      - PGADMIN_CONFIG_PROXY_X_PROTO_COUNT=1
      - PGADMIN_CONFIG_PROXY_X_PORT_COUNT=1
      - PGADMIN_CONFIG_PROXY_X_HOST_COUNT=1
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - enterprise-network
    restart: unless-stopped
    profiles:
      - debug

  # Optional: Celery worker for async tasks
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-auth-celery-worker
    command: celery -A src worker -l info
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=src.settings
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/enterprise_auth_dev
      - REDIS_URL=redis://cache:6379/0
      - CELERY_BROKER_URL=redis://cache:6379/1
      - SECRET_KEY=dev-secret-key-not-for-production
      - POSTGRES_DB=enterprise_auth_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - .:/app
      - app_logs:/app/logs
    depends_on:
      - db
      - cache
      - app
    networks:
      - enterprise-network
    restart: unless-stopped
    profiles:
      - async

  # Optional: Celery Beat for scheduled tasks
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-auth-celery-beat
    command: celery -A src beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=src.settings
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/enterprise_auth_dev
      - REDIS_URL=redis://cache:6379/0
      - CELERY_BROKER_URL=redis://cache:6379/1
      - SECRET_KEY=dev-secret-key-not-for-production
      - POSTGRES_DB=enterprise_auth_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - .:/app
      - app_logs:/app/logs
    depends_on:
      - db
      - cache
      - app
    networks:
      - enterprise-network
    restart: unless-stopped
    profiles:
      - async

# Volume definitions for data persistence
volumes:
  postgres_data:
    driver: local
  postgres_backups:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_static:
    driver: local
  app_media:
    driver: local

# Network definition for service communication
networks:
  enterprise-network:
    driver: bridge
